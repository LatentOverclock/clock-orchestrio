services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clock
      POSTGRES_PASSWORD: clock
      POSTGRES_DB: clock
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clock -d clock"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://clock:clock@db:5432/clock?sslmode=disable
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=edge-proxy"
      - "traefik.http.routers.clock-orchestrio.rule=Host(`clock.orchestrio.li`)"
      - "traefik.http.routers.clock-orchestrio.entrypoints=websecure"
      - "traefik.http.routers.clock-orchestrio.tls.certresolver=letsencrypt"
      - "traefik.http.services.clock-orchestrio.loadbalancer.server.port=80"
    networks:
      - default
      - edge-proxy

volumes:
  db-data:

networks:
  edge-proxy:
    external: true
