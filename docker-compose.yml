services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clock
      POSTGRES_PASSWORD: clock
      POSTGRES_DB: clock
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clock -d clock"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://clock:clock@db:5432/clock?sslmode=disable
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  db-data:
