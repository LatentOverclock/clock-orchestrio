<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clock Orchestrio</title>
    <style>
      :root {
        --bg: #0b1020;
        --card: #121a33;
        --text: #e7ecff;
        --line: #26335f;
        --accent: #7dd3fc;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Inter, system-ui, sans-serif; color: var(--text); background: var(--bg); }
      .container { max-width: 980px; margin: 0 auto; padding: 16px; }
      .header { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
      .panel { margin-top: 12px; background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 14px; }
      .row { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
      .field { display: flex; flex-direction: column; gap: 6px; flex: 1 1 180px; }
      input, button { padding: 10px 12px; font-size: 16px; border-radius: 10px; border: 1px solid #334677; }
      input { color: var(--text); background: #0f1730; }
      button { background: #1d3063; color: var(--text); cursor: pointer; }
      a { color: var(--accent); }
      .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 12px; }
      table { width: 100%; min-width: 680px; border-collapse: collapse; }
      th, td { padding: 10px; border-bottom: 1px solid var(--line); text-align: left; }
      @media (max-width: 700px) {
        table, thead, tbody, tr, th, td { display: block; width: 100%; min-width: 0; }
        thead { display: none; }
        tr { border: 1px solid var(--line); border-radius: 12px; margin-bottom: 10px; padding: 6px 0; }
        td { border: none; border-bottom: 1px dashed #2a3766; padding: 9px 10px 9px 44%; position: relative; min-height: 36px; }
        td::before { content: attr(data-label); position: absolute; left: 10px; top: 9px; width: 36%; font-weight: 600; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Clock Orchestrio</h1>
        <a href="https://github.com/LatentOverclock/clock-orchestrio" target="_blank" rel="noreferrer">View GitHub Repo</a>
      </div>

      <section class="panel">
        <h3>Live Timer</h3>
        <div id="active">Loading status…</div>
        <div class="row">
          <div class="field"><label for="task">Task</label><input id="task" /></div>
          <div class="field"><label for="notes">Notes</label><input id="notes" /></div>
        </div>
        <div class="row"><button onclick="startTimer()">Start</button><button onclick="stopTimer()">Stop</button></div>
      </section>

      <section class="panel">
        <h3>Manual Entry</h3>
        <div class="row"><div class="field"><label for="mtask">Task</label><input id="mtask" /></div></div>
        <div class="row">
          <div class="field"><label for="mstart">From</label><input id="mstart" type="datetime-local" /></div>
          <div class="field"><label for="mend">To</label><input id="mend" type="datetime-local" /></div>
          <button onclick="addManual()">Add</button>
        </div>
      </section>

      <section class="panel">
        <h3>Recent Entries</h3>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Task</th><th>Start</th><th>End</th><th>Duration</th><th>Notes</th><th>Action</th></tr></thead>
            <tbody id="entries"></tbody>
          </table>
        </div>
      </section>
    </div>

    <script>
      function fmtDuration(s) {
        if (!s && s !== 0) return '—';
        const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
        return `${h}h ${m}m ${sec}s`;
      }

      async function refresh() {
        const status = await fetch('/api/status').then(r => r.json());
        document.getElementById('active').textContent = status.active
          ? `Active: ${status.active.task} (started ${new Date(status.active.started_at).toLocaleString()})`
          : 'No active timer';

        const entries = await fetch('/api/entries').then(r => r.json());
        document.getElementById('entries').innerHTML = entries.map(e => `<tr>
          <td data-label="Task">${e.task}</td>
          <td data-label="Start">${new Date(e.started_at).toLocaleString()}</td>
          <td data-label="End">${e.ended_at ? new Date(e.ended_at).toLocaleString() : '—'}</td>
          <td data-label="Duration">${fmtDuration(e.duration_seconds)}</td>
          <td data-label="Notes">${e.notes || ''}</td>
          <td data-label="Action"><button onclick="deleteEntry(${e.id})">Delete</button></td>
        </tr>`).join('');
      }

      async function startTimer() {
        const task = document.getElementById('task').value.trim();
        const notes = document.getElementById('notes').value.trim();
        const r = await fetch('/api/start', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ task, notes }) });
        if (!r.ok) alert((await r.json()).error || 'Failed to start');
        await refresh();
      }

      async function stopTimer() {
        const r = await fetch('/api/stop', { method: 'POST' });
        if (!r.ok) alert((await r.json()).error || 'Failed to stop');
        await refresh();
      }

      async function addManual() {
        const task = document.getElementById('mtask').value.trim();
        const started_at = document.getElementById('mstart').value;
        const ended_at = document.getElementById('mend').value;
        const r = await fetch('/api/manual', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ task, started_at, ended_at }) });
        if (!r.ok) alert((await r.json()).error || 'Failed to add');
        await refresh();
      }

      async function deleteEntry(id) {
        const r = await fetch(`/api/entries/${id}`, { method: 'DELETE' });
        if (!r.ok) alert((await r.json()).error || 'Failed to delete');
        await refresh();
      }

      refresh();
      setInterval(refresh, 15000);
    </script>
  </body>
</html>
