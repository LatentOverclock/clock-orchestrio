<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clock Orchestrio</title>
    <style>
      :root {
        --bg: #0b1020;
        --card: #121a33;
        --card-2: #0f1730;
        --text: #e7ecff;
        --muted: #9aa7d1;
        --line: #26335f;
        --accent: #7dd3fc;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 10% -10%, #1b2d61, var(--bg) 38%), var(--bg);
      }
      .container {
        max-width: 980px;
        margin: 0 auto;
        padding: 20px 14px 28px;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 14px;
      }
      .title { margin: 0; font-size: 1.6rem; }
      .muted { color: var(--muted); font-size: 0.95rem; }
      .github-link {
        color: var(--accent);
        text-decoration: none;
        border: 1px solid #35508f;
        background: #111c3d;
        padding: 8px 12px;
        border-radius: 10px;
        font-size: 0.92rem;
      }
      .github-link:hover { border-color: #4f73c4; }

      .panel {
        background: linear-gradient(180deg, var(--card), var(--card-2));
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px;
        margin: 12px 0;
      }

      h2, h3 { margin: 6px 0 10px; }

      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin: 10px 0;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        flex: 1 1 180px;
        min-width: 150px;
      }

      .label {
        color: #aebbe3;
        font-size: 0.84rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      input, button, textarea {
        padding: 10px 12px;
        font-size: 16px;
        border-radius: 10px;
        border: 1px solid #334677;
      }
      input, textarea {
        color: var(--text);
        background: #0f1730;
        max-width: 100%;
      }
      button {
        background: #1d3063;
        color: var(--text);
        cursor: pointer;
      }
      button:hover { background: #274080; }

      .actions {
        display: flex;
        gap: 8px;
        align-items: flex-end;
      }

      .table-wrap {
        width: 100%;
        overflow-x: auto;
        border: 1px solid var(--line);
        border-radius: 12px;
      }
      table { width: 100%; border-collapse: collapse; min-width: 680px; }
      th, td {
        border-bottom: 1px solid var(--line);
        text-align: left;
        padding: 10px;
        vertical-align: top;
        word-break: break-word;
      }
      th { color: #b8c6f0; font-weight: 600; background: #0f1730; }
      tr:last-child td { border-bottom: none; }

      @media (max-width: 700px) {
        .container { padding: 12px 10px 16px; }
        .panel { padding: 12px; margin: 10px 0; border-radius: 12px; }
        .header { align-items: flex-start; flex-direction: column; margin-bottom: 8px; }
        .title { font-size: 1.4rem; }
        .row { gap: 8px; margin: 8px 0; }
        .field { min-width: 100%; }
        .actions {
          width: 100%;
          justify-content: flex-start;
        }
        .actions button { width: 100%; }

        .table-wrap { border: none; overflow: visible; }
        table, thead, tbody, tr, th, td { display: block; width: 100%; min-width: 0; }
        thead { display: none; }
        tr {
          border: 1px solid var(--line);
          border-radius: 12px;
          background: #0f1730;
          margin-bottom: 10px;
          padding: 6px 0;
        }
        td {
          border: none;
          border-bottom: 1px dashed #2a3766;
          padding: 9px 10px 9px 44%;
          position: relative;
          min-height: 36px;
          word-break: break-word;
        }
        td:last-child { border-bottom: none; }
        td::before {
          content: attr(data-label);
          position: absolute;
          left: 10px;
          top: 9px;
          width: 36%;
          color: #9fb0df;
          font-weight: 600;
          white-space: nowrap;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div>
          <h1 class="title">Clock Orchestrio</h1>
          <p class="muted">Simple time tracking with running timer + manual entries.</p>
        </div>
        <a class="github-link" href="https://github.com/LatentOverclock/clock-orchestrio" target="_blank" rel="noreferrer">View GitHub Repo</a>
      </div>

      <section class="panel">
        <h3>Live Timer</h3>
        <div id="active" class="muted">Loading status…</div>

        <div class="row">
          <div class="field">
            <label class="label" for="task">Task</label>
            <input id="task" aria-label="Task" />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label class="label" for="notes">Notes</label>
            <input id="notes" aria-label="Notes" />
          </div>
          <div class="actions">
            <button onclick="startTimer()">Start</button>
            <button onclick="stopTimer()">Stop</button>
          </div>
        </div>
      </section>

      <section class="panel">
        <h3>Manual Entry</h3>
        <div class="row">
          <div class="field">
            <label class="label" for="mtask">Task</label>
            <input id="mtask" aria-label="Task" />
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label class="label" for="mstart">From</label>
            <input id="mstart" type="datetime-local" aria-label="From" title="From" />
          </div>
          <div class="field">
            <label class="label" for="mend">To</label>
            <input id="mend" type="datetime-local" aria-label="To" title="To" />
          </div>
          <div class="actions">
            <button onclick="addManual()">Add</button>
          </div>
        </div>
      </section>

      <section class="panel">
        <h3>Recent Entries</h3>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Task</th><th>Start</th><th>End</th><th>Duration</th><th>Notes</th><th>Action</th></tr>
            </thead>
            <tbody id="entries"></tbody>
          </table>
        </div>
      </section>
    </div>

    <script>
      function fmtDuration(s) {
        if (!s && s !== 0) return '—';
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        return `${h}h ${m}m ${sec}s`;
      }

      async function refresh() {
        const status = await fetch('/api/status').then(r => r.json());
        const activeEl = document.getElementById('active');
        if (status.active) {
          activeEl.textContent = `Active: ${status.active.task} (started ${new Date(status.active.started_at).toLocaleString()})`;
        } else {
          activeEl.textContent = 'No active timer';
        }

        const entries = await fetch('/api/entries').then(r => r.json());
        const tbody = document.getElementById('entries');
        tbody.innerHTML = entries.map(e => `<tr>
          <td data-label="Task">${e.task}</td>
          <td data-label="Start">${new Date(e.started_at).toLocaleString()}</td>
          <td data-label="End">${e.ended_at ? new Date(e.ended_at).toLocaleString() : '—'}</td>
          <td data-label="Duration">${fmtDuration(e.duration_seconds)}</td>
          <td data-label="Notes">${e.notes || ''}</td>
          <td data-label="Action"><button onclick="deleteEntry(${e.id})">Delete</button></td>
        </tr>`).join('');
      }

      async function startTimer() {
        const task = document.getElementById('task').value.trim();
        const notes = document.getElementById('notes').value.trim();
        const r = await fetch('/api/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ task, notes })
        });
        if (!r.ok) alert((await r.json()).error || 'Failed to start');
        await refresh();
      }

      async function stopTimer() {
        const r = await fetch('/api/stop', { method: 'POST' });
        if (!r.ok) alert((await r.json()).error || 'Failed to stop');
        await refresh();
      }

      async function addManual() {
        const task = document.getElementById('mtask').value.trim();
        const started_at = document.getElementById('mstart').value;
        const ended_at = document.getElementById('mend').value;
        const r = await fetch('/api/manual', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ task, started_at, ended_at })
        });
        if (!r.ok) alert((await r.json()).error || 'Failed to add');
        await refresh();
      }

      async function deleteEntry(id) {
        if (!confirm('Delete this entry?')) return;
        const r = await fetch(`/api/entries/${id}`, { method: 'DELETE' });
        if (!r.ok) alert((await r.json()).error || 'Failed to delete');
        await refresh();
      }

      refresh();
      setInterval(refresh, 15000);
    </script>
  </body>
</html>
